name: Auto Scrape Gasoline Data

on:
  schedule:
    # 避開週末非交易時段 (使用 UTC 時間)
    # 週一到週五的每個小時 (UTC 0-23)
    - cron: '0 * * * 1-5'
    # 週日的 22:00 與 23:00 (配合週末開盤)
    - cron: '0 22,23 * * 0'
  workflow_dispatch: # 允許在 GitHub 網頁上手動按鈕觸發測試

permissions:
  contents: write # 確保 GitHub Actions 有權限 push code

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapers
        run: |
          python Download_pepperstone_gasoline.py
          python Gate_download.py
          python fix_date.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.csv
          git commit -m "Auto-update gasoline data" || echo "No changes to commit"
          git push
